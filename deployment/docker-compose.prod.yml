version: '3.8'

services:
  # ── nginx reverse proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: gramchain_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount Let's Encrypt certs (provision with certbot before first run)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy

  # ── backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gramchain_backend
    restart: unless-stopped
    # NOT exposed to host — only nginx forwards to it
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ML_SERVICE_URL=http://ml:8000
    env_file:
      - ../backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml:
    build:
      context: ../ml
      dockerfile: Dockerfile
    container_name: gramchain_ml
    restart: unless-stopped
    environment:
      - ML_INTERNAL_SECRET=${ML_INTERNAL_SECRET}
      - ALLOWED_ORIGINS=http://backend:3000
    # No exposed ports — only accessible to backend via internal Docker network
    expose:
      - "8000"

  postgres:
    image: postgres:15-alpine
    container_name: gramchain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gramchain}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gramchain_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
