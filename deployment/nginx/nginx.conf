# GramChain nginx reverse proxy
# Handles: TLS termination, security headers, rate limiting, gzip

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_min_length    1000;
    gzip_types         text/plain application/json application/javascript text/css;

    # ── Hide nginx version ───────────────────────────────────
    server_tokens off;

    # ── Rate limiting zones ──────────────────────────────────
    # General API — 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    # Auth endpoints — 10 req/min per IP (OTP/login)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # Payment endpoints — 20 req/min per IP
    limit_req_zone $binary_remote_addr zone=payment:10m rate=20r/m;

    # ── Upstream ─────────────────────────────────────────────
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS — certificates provisioned by Certbot/Let's Encrypt
        # Mount the cert directory as a Docker volume.
        ssl_certificate     /etc/letsencrypt/live/gramchain/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gramchain/privkey.pem;

        # Modern TLS config (Mozilla Intermediate)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # ── Security headers ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header X-XSS-Protection          "1; mode=block"                               always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

        # ── Health check (no rate limit) ─────────────────────
        location = /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Razorpay webhook (no auth, raw body) ─────────────
        location = /api/v1/payment/webhook {
            limit_req zone=payment burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Don't buffer — raw body must reach Express intact
            proxy_request_buffering off;
        }

        # ── Auth routes (tighter limit) ──────────────────────
        location ~ ^/api/v1/auth/(send-otp|verify-otp|login|register) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection         "";
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }

        # ── All other API routes ──────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Reasonable timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Body size — matches Express 10mb limit
            client_max_body_size 10m;
        }

        # ── Block everything else ─────────────────────────────
        location / {
            return 404;
        }
    }
}
