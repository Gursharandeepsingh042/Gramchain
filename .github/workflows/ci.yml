name: GramChain CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Backend: Lint, Build, Test ────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gramchain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/gramchain_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-characters
      DEMO_MODE: 'true'
      NODE_ENV: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Push Schema to Test DB
        working-directory: ./backend
        run: npx prisma db push --skip-generate

      - name: Build TypeScript
        working-directory: ./backend
        run: npm run build

      - name: Run Tests
        working-directory: ./backend
        run: npm test -- --passWithNoTests --ci --coverage

  # ─── Smart Contracts: Compile + Test ───────────────────────
  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: blockchain/package-lock.json

      - name: Install Dependencies
        working-directory: ./blockchain
        run: npm ci

      - name: Compile Contracts
        working-directory: ./blockchain
        run: npx hardhat compile

      - name: Run Hardhat Tests
        working-directory: ./blockchain
        run: npx hardhat test

  # ─── Deploy (only on main push, after tests pass) ──────────
  deploy:
    name: Deploy to Production
    needs: [backend, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH for Deployment
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SERVER_SSH_KEY }}

      - name: Deploy via Docker Compose
        env:
          HOST: ${{ secrets.PROD_SERVER_IP }}
          USER: ${{ secrets.PROD_SERVER_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd /opt/gramchain
            git pull origin main
            
            # Backend: install deps + run migrations
            cd backend
            npm ci --production
            npx prisma generate
            npx prisma migrate deploy
            cd ..

            # Rebuild and restart containers
            cd deployment
            docker-compose -f docker-compose.prod.yml up -d --build
            
            # Prune old images to save space
            docker image prune -f
          EOF
