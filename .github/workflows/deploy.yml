name: GramChain Production CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Prisma Generate
        working-directory: ./backend
        run: npx prisma generate

      - name: Build TypeScript
        working-directory: ./backend
        run: npm run build

      # Add `npm run lint` and `npm test` here when tests are written for the backend

  smart-contract-tests:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blockchain/package-lock.json

      - name: Install Dependencies
        working-directory: ./blockchain
        run: npm ci

      - name: Run Hardhat Tests
        working-directory: ./blockchain
        run: npx hardhat test

  # ── Option A: Railway auto-deploy (recommended for staging) ─
  deploy-railway:
    name: Deploy to Railway (Staging)
    needs: [lint-and-test, smart-contract-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service gramchain-backend --detach
          echo "✅ Railway deployment triggered — monitor at https://railway.app"


